<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cycle Partner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="app">
    <h1>Partner View</h1>

    <section class="card">
      <div class="month-nav">
        <button id="prevMonth">‹</button>
        <h2 id="monthLabel"></h2>
        <button id="nextMonth">›</button>
      </div>

      <div id="calendar" class="calendar"></div>
      <div class="legend">

  <div class="legend-item">
    <span class="legend-color period"></span>
    生理期間
  </div>

  <div class="legend-item">
    <span class="legend-color predicted"></span>
    生理予測
  </div>

  <div class="legend-item">
    <span class="legend-color ovulation"></span>
    排卵予測
  </div>

  <div class="legend-item">
    <span class="legend-color fertile"></span>
    妊娠しやすい時期
  </div>

</div>
    </section>

    <section class="card">
      <h2>共有メモ</h2>
      <p>次の生理開始：<span id="nextPeriod">未記録</span></p>
      <p>生理期間：<span id="nextRange">未記録</span></p>
      <p>排卵予測：<span id="ovulation">未記録</span></p>
      <p>メンタル天気：<span id="mentalWeather">☀️安定</span></p>
      <p id="updatedAt"></p>
    </section>
  </main>

  <script type="module" src="./partner.js"></script>
</body>
</html>
