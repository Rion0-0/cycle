<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rino Cycle Share</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <header class="hero">
    <p class="eyebrow">shared view</p>

    <h1>Rino Cycle 🌙</h1>

    <p class="lead">
      今日の体調と周期予定
    </p>
  </header>

  <section class="card overview">

    <div class="stat big">
      <span>次の生理予定</span>
      <strong id="nextPeriod">--</strong>
    </div>
<div class="stat weather">

  <span>今日のメンタル天気</span>

  <strong id="mentalWeather">--</strong>

  <small id="weatherNote">--</small>

  <p id="updatedAt" class="updated">
    最終更新：--
  </p>

</div>
  </section>

  <section class="card">

    <div class="calendar-head">
      <button id="prevMonth">‹</button>
      <h2 id="monthLabel">--</h2>
      <button id="nextMonth">›</button>
    </div>

   <div class="legend partner-legend">

  <span>
    <i class="dot predicted"></i>
    生理予定
  </span>

  <span>
    <i class="dot ovulation"></i>
    排卵
  </span>

  <span>
    <i class="dot fertile"></i>
    妊娠可能性
  </span>

  <span>
    <i class="dot pms"></i>
    PMS
  </span>

</div>
    <div class="weekdays">
      <span>日</span>
      <span>月</span>
      <span>火</span>
      <span>水</span>
      <span>木</span>
      <span>金</span>
      <span>土</span>
    </div>

    <div id="calendar" class="calendar"></div>

  </section>

</div>

<script src="partner.js"></script>

</body>
</html>
