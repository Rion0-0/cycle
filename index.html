<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cycle App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="app">
    <h1>Cycle Log</h1>

    <section class="card">
      <div class="month-nav">
        <button id="prevMonth">‹</button>
        <h2 id="monthLabel"></h2>
        <button id="nextMonth">›</button>
      </div>

      <div id="calendar" class="calendar"></div>
      <div class="legend">

  <div class="legend-item">
    <span class="legend-color period"></span>
    生理期間
  </div>

  <div class="legend-item">
    <span class="legend-color predicted"></span>
    生理予測
  </div>

  <div class="legend-item">
    <span class="legend-color ovulation"></span>
    排卵予測
  </div>

  <div class="legend-item">
    <span class="legend-color fertile"></span>
    妊娠しやすい時期
  </div>

</div>
    </section>

    <section class="card">
      <h2 id="selectedLabel"></h2>

      <div class="actions">
        <button id="periodStartBtn">🩸 生理開始</button>
        <button id="periodEndBtn">🌙 生理終了</button>
        <button id="periodCancelBtn">↩️ 生理記録を取消</button>
      </div>

      <div class="symptoms">
        <button data-symptom="眠気">😴 眠気</button>
        <button data-symptom="吐き気">🤢 吐き気</button>
        <button data-symptom="胸の張り">🫧 胸の張り</button>
      </div>

      <textarea id="watchInput" placeholder="Apple Watch記録を貼ってね"></textarea>
      <button id="saveWatch">Watch記録を保存</button>

      <div id="dayDetail"></div>
    </section>

    <section class="card">
      <h2>予測</h2>
      <p>次の生理開始：<span id="nextPeriod">未記録</span></p>
      <p>生理期間：<span id="nextRange">未記録</span></p>
      <p>排卵予測：<span id="ovulation">未記録</span></p>
      <p>メンタル天気：<span id="mentalWeather">☀️安定</span></p>
      <p id="updatedAt"></p>
    </section>

    <section id="stats" class="card"></section>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
